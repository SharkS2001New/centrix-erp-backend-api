services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos_erp
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: ghcr.io/sharks2001new/centrix-erp-backend-api:local
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8001
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pos_erp
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database

volumes:
  mysql-data:
